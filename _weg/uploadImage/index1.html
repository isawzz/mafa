<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Upload</title>
  <style>
    #dropArea {
      border: 2px dashed #ccc;
      padding: 20px;
      text-align: center;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h1>Image Upload</h1>
  <div id="dropArea">Drag & drop an image here</div>
  <div id="response"></div>

  <script>
    var dropArea = document.getElementById('dropArea');
    var responseDiv = document.getElementById('response');

    
    function displayDroppedImageResized(ev) {
      let reader = ev.target;
      var imgElement = document.createElement('img');
      imgElement.src = reader.result;
      imgElement.style.maxWidth = '100%';
      dropArea.innerHTML = '';
      dropArea.appendChild(imgElement);
    }
    function displayDroppedImage(ev) {
      let reader = ev.target;
      var imgElement = document.createElement('img');
      imgElement.src = reader.result;
      imgElement.style.maxWidth = '100%';
      dropArea.innerHTML = '';
      dropArea.appendChild(imgElement);
    }
    function onDragOver(ev) { event.preventDefault(); dropArea.style.borderColor = 'blue'; }
    function onDragLeave(ev) { dropArea.style.borderColor = '#ccc'; }
    function onDrop(ev) {
      event.preventDefault();
      dropArea.style.borderColor = '#ccc';
      var files = event.dataTransfer.files;
      if (files.length > 0) {
        var reader = new FileReader();
        reader.onload = displayDroppedImage;
        reader.readAsDataURL(files[0]);
        console.log('SUCCESS!!!')
      }
    }

    dropArea.addEventListener('dragover', onDragOver);
    dropArea.addEventListener('dragleave', onDragLeave);
    dropArea.addEventListener('drop', onDrop);
  </script>
</body>

</html>
