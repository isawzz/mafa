<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>datalist</title>
	<link rel="stylesheet" href="../datalist/styles.css" />
</head>

<body>
	
	<input list="options" id="inputField" placeholder="Type here and press Enter">
	<datalist id="options"></datalist>
	
	<script>
			const inputField = document.getElementById('inputField');
			const datalist = document.getElementById('options');
	
			inputField.addEventListener('keyup', function(event) {
					if (event.key === 'Enter') {
							const option = document.createElement('option');
							option.value = inputField.value;
							datalist.appendChild(option);
							inputField.value = ''; // Clear the input field after adding the option
					}
			});
	</script>
	
  <script src="../basejs/alibs/jsyaml.js"></script>

	<script src="../basejs/allghuge.js"></script>
	<script src="../basejs/allfhuge.js"></script>
	
	<!-- <script src="../factory/closure.js"></script> -->
	<script src="../datalist/newcode.js"></script>
	<script src="../datalist/test.js"></script>
	<script src="../datalist/start.js"></script>


</body>

</html>
