<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Image Upload</title>
	<style>
		#previewContainer {
			display: inline-block;
			position: relative;
			overflow: hidden;
			padding: 5px;
		}

		#previewImage {
			border: 2px solid #ccc;
		}

		.resize-handle {
			width: 20px;
			height: 20px;
			border-radius: 50%;
			background-color: #007bff;
			position: absolute;
		}

		.resize-handle.top-left {
			top: 0px;
			left: 0px;
			cursor: nwse-resize;
		}

		.resize-handle.bottom-right {
			bottom: 0px;
			right: 0px;
			cursor: nwse-resize;
		}
	</style>
</head>

<body>
	<div id="previewContainer">
		<img id="previewImage" src="../imagecrop/hallo.png" alt="Preview Image">
		<div class="resize-handle top-left"></div>
		<div class="resize-handle bottom-right"></div>
	</div>
	<button id="uploadButton">Upload Image</button>
</body>
<script src="../imagecrop/script.js"></script>

</html>
