<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Omnifin</title>
	<link rel="icon" href="../assets/img/emo/money-bag.png" style="height: 60px" />
	<link rel="stylesheet" href="../assets/fonts/fonts.css" />
	<link rel="stylesheet" href="../ode/styles.css" />
	<script src="../basejs/alibs/jq3.js"></script>
	<script src="../basejs/alibs/jsyaml.js"></script>
</head>
<body>
    <h1>SQLite Database Viewer</h1>
    <input type="file" id="dbfile" accept=".db" />
    <textarea id="sql-input" rows="10" cols="50" placeholder="Enter SQL commands here..."></textarea>
    <button onclick="executeSQL()">Execute</button>
    <pre id="output"></pre>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
    <script>
        let db;

        document.getElementById('dbfile').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function() {
                    const Uints = new Uint8Array(reader.result);
                    initSqlJs({ locateFile: filename => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.wasm` }).then(function(SQL) {
                        db = new SQL.Database(Uints);
                        document.getElementById('output').textContent = 'Database loaded successfully.';
                    }).catch(error => {
                        document.getElementById('output').textContent = 'Error initializing database: ' + error.message;
                    });
                };
                reader.readAsArrayBuffer(file);
            }
        });

        function executeSQL() {
            const sqlInput = document.getElementById('sql-input').value;
            if (!db) {
                document.getElementById('output').textContent = 'Database not loaded.';
                return;
            }
            try {
                const result = db.exec(sqlInput);
                const output = result.map(({ columns, values }) => {
                    return columns.join('\t') + '\n' + values.map(row => row.join('\t')).join('\n');
                }).join('\n\n');
                document.getElementById('output').textContent = output || 'Query executed successfully.';
            } catch (error) {
                document.getElementById('output').textContent = 'Error executing SQL: ' + error.message;
            }
        }
    </script>
</body>
</html>
