<!-- #region ColorThief getpalette example js -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette Example</title>
    <!-- Include ColorThief -->
    <script src="https://cdn.jsdelivr.net/npm/colorthief@2.3.2/dist/color-thief.min.js"></script>
</head>
<body>
    <h1>Color Palette Example</h1>
    <img id="image" src="example.jpg" alt="Example Image">

    <script>
        // Get reference to the image
        const image = document.getElementById('image');

        // Create a ColorThief instance
        const colorThief = new ColorThief();

        // Listen for the image to finish loading
        image.addEventListener('load', () => {
            // Get the color palette from the image
            const palette = colorThief.getPalette(image, 5); // Get 5 colors in the palette

            // Log the color palette to the console
            console.log('Color Palette:', palette);

            // Display the color palette
            displayPalette(palette);
        });

        // Function to display the color palette
        function displayPalette(palette) {
            const paletteContainer = document.createElement('div');
            paletteContainer.classList.add('palette-container');

            palette.forEach(color => {
                const colorBox = document.createElement('div');
                colorBox.style.backgroundColor = `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
                colorBox.classList.add('color-box');
                paletteContainer.appendChild(colorBox);
            });

            document.body.appendChild(paletteContainer);
        }
    </script>

    <style>
        .palette-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        .color-box {
            width: 50px;
            height: 50px;
            margin: 0 10px;
            border: 1px solid #000;
        }
    </style>
</body>
</html>

<!-- #region js function to convert a div into an image or canvas -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Convert Div to Image</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div id="contentDiv" style="width: 300px; height: 200px; background-color: #4CAF50; color: white; display: flex; align-items: center; justify-content: center;">
    <h1>Hello, World!</h1>
</div>
<button onclick="convertDivToCanvas()">Convert to Canvas</button>
<button onclick="convertDivToImage()">Convert to Image</button>
<script>
function convertDivToCanvas() {
    const div = document.getElementById('contentDiv');
    html2canvas(div).then(canvas => {
        // Do something with the canvas
        document.body.appendChild(canvas); // Append canvas to body or handle differently
    });
}

function convertDivToImage() {
    const div = document.getElementById('contentDiv');
    html2canvas(div).then(canvas => {
        const img = canvas.toDataURL('image/png');
        const imageElement = document.createElement('img');
        imageElement.src = img;
        document.body.appendChild(imageElement); // Append image to body or handle differently
    });
}
</script>
</body>
</html>
<!-- #endregion -->

<!-- #region js extract colors from a div with a backgroundImage -->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Extract Colors from Background Image</title>
</head>
<body>
<div id="imageDiv" style="width: 500px; height: 500px; background-image: url('your-image-url.jpg');"></div>
<canvas id="canvas" style="display: none;"></canvas>
<script>
function extractColors() {
    const div = document.getElementById('imageDiv');
    const imageUrl = div.style.backgroundImage.slice(5, -2); // Remove `url(" and ")`
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const img = new Image();

    img.onload = function() {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        const imageData = ctx.getImageData(0, 0, img.width, img.height);
        const colors = analyzeColors(imageData);
        console.log(colors);
    };

    img.src = imageUrl;
}

function analyzeColors(imageData) {
    const data = imageData.data;
    const colors = {};
    // Example: Simple count of colors, might need quantization for better color grouping
    for (let i = 0; i < data.length; i += 4) {
        const key = `${data[i]}-${data[i+1]}-${data[i+2]}`; // RGB color key
        if (colors[key]) {
            colors[key]++;
        } else {
            colors[key] = 1;
        }
    }
    return colors;
}

extractColors();
</script>
</body>
</html>
